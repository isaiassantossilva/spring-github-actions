name: Frontend CI/CD

on:
  push:
    branches:
      - "main"
    tags:
      - "v*"
    paths:
      - "spring-github-actions-frontend/**"
      - ".github/workflows/frontend.yml"
  workflow_dispatch:

defaults:
  run:
    working-directory: spring-github-actions-frontend

permissions:
  contents: read

env:
  REGISTRY: registry.example.net
  IMAGE_NAME: spring-github-actions-frontend

jobs:
  test:
    name: Lint, Typecheck & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Cancel superseded build/test runs on the same ref to save CI minutes.
    concurrency:
      group: frontend-build-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: spring-github-actions-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (typecheck + bundle)
        run: npm run build

  publish:
    name: Build And Push Image
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10
    concurrency:
      group: frontend-build-${{ github.ref }}
      cancel-in-progress: true
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          # registry: ${{ env.REGISTRY }} # Optional if the registry is Docker Hub
          username: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
          password: ${{ secrets.CONTAINER_REGISTRY_PASSWORD }}

      - name: Extract image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          images: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: spring-github-actions-frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
          build-args: |
            VERSION=${{ github.sha }}
          labels: |
            ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    timeout-minutes: 10
    # Never cancel an in-flight production deploy; queue new ones instead.
    concurrency:
      group: frontend-deploy-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Trigger Deploy
        env:
          WEBHOOK: "https://webhook.example.net/api/webhooks/deploy-frontend"
          TOKEN: "token-example"
        run: |
          echo "Triggering deploy webhook"
          echo "Webhook URL: $WEBHOOK"
          echo "Token: $TOKEN"
